<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm Hiểu Luật Biển Quốc Tế</title>
    <style>
        :root {
    /* Ocean Color Palette */
    --deep-blue: #002b5b;
    --ocean-gradient: linear-gradient(135deg, #000428 0%, #004e92 100%);
    --teal: #256d85;
    --cyan: #068da9;
    --sand: #f3e5ab;
    --coral: #ff7f50;
    --foam-white: rgba(255, 255, 255, 0.9);
    --glass-bg: rgba(255, 255, 255, 0.15);
    --glass-border: rgba(255, 255, 255, 0.2);
}

* {
    box-sizing: border-box;
    transition: all 0.3s ease;
}

body {
    font-family: 'Montserrat', sans-serif;
    background: var(--ocean-gradient);
    background-attachment: fixed;
    color: white;
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
}

/* Background Animated Bubbles */
body::before, body::after {
    content: "";
    position: fixed;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
    border-radius: 50%;
    z-index: -1;
    animation: float 15s infinite ease-in-out;
}

body::before { top: -10%; left: -5%; }
body::after { bottom: -10%; right: -5%; animation-delay: -5s; }

@keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(30px, -50px) scale(1.1); }
}

/* Glassmorphism Container */
.app-container {
    width: 90%;
    max-width: 700px;
    padding: 40px;
    background: var(--glass-bg);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid var(--glass-border);
    border-radius: 30px;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
    margin: 20px;
}

/* Header Styling */
header h1 {
    font-size: 2.2rem;
    text-align: center;
    color: var(--sand);
    text-shadow: 0 4px 10px rgba(0,0,0,0.3);
    margin-bottom: 5px;
}

header .subtitle {
    text-align: center;
    color: var(--cyan);
    font-weight: 600;
    margin-bottom: 30px;
    display: block;
}

/* List Items (Stones/Pearls) */
.btn-item {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid var(--glass-border);
    color: white;
    padding: 18px 25px;
    border-radius: 15px;
    margin-bottom: 12px;
    cursor: pointer;
    font-size: 1rem;
    display: block;
    width: 100%;
    text-align: left;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.btn-item:hover {
    background: rgba(255, 255, 255, 0.25);
    transform: translateX(10px);
    border-color: var(--cyan);
    box-shadow: -5px 5px 20px rgba(72, 198, 239, 0.3);
}

/* Navigation Buttons */
.btn-nav {
    background: transparent;
    border: 1px solid var(--sand);
    color: var(--sand);
    padding: 8px 18px;
    border-radius: 50px;
    cursor: pointer;
    font-weight: bold;
    font-size: 0.8rem;
}

.btn-nav:hover {
    background: var(--sand);
    color: var(--deep-blue);
}

/* Question Card */
.card {
    background: rgba(255, 255, 255, 0.95);
    color: var(--deep-blue);
    padding: 35px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

.badge {
    background: var(--cyan);
    color: white;
    padding: 4px 12px;
    border-radius: 8px;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
}

.q-text {
    font-size: 1.5rem;
    font-weight: 700;
    margin: 20px 0;
    line-height: 1.3;
}

/* Reveal Button (The Treasure Button) */
.btn-ocean {
    background: linear-gradient(to right, #008080, #48c6ef);
    color: white;
    border: none;
    padding: 15px 30px;
    border-radius: 50px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 10px 20px rgba(6, 141, 169, 0.3);
    text-transform: uppercase;
}

.btn-ocean:hover {
    transform: scale(1.05);
    box-shadow: 0 15px 25px rgba(6, 141, 169, 0.5);
}

/* Answer Content */
.answer-box {
    margin-top: 25px;
    padding: 20px;
    background: #f0fbff;
    border-radius: 15px;
    border-left: 6px solid var(--cyan);
    text-align: left;
    animation: slideUp 0.4s ease-out;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.a-text {
    font-size: 1.1rem;
    color: #333;
    line-height: 1.5;
}

/* Utilities */
.screen { display: none; }
.active { display: block; animation: fadeIn 0.6s ease; }
.hidden { display: none; }

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

footer {
    text-align: center;
    margin-top: 30px;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.5);
}
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>🌊 Tìm Hiểu Luật Biển Quốc Tế 🇻🇳</h1>
        </header>

        <section id="view-topics" class="screen active">
            <p class="instruction">Chọn chủ đề để bắt đầu:</p>
            <div id="topic-list" class="list-group">
                </div>
        </section>

        <section id="view-questions" class="screen hidden">
            <div class="nav-bar">
                <button class="btn-nav" onclick="app.goBackToTopics()">⬅ Về danh sách chủ đề</button>
            </div>
            <h2 id="topic-title-display">Title</h2>
            <div id="question-list" class="list-group">
                </div>
        </section>

        <section id="view-detail" class="screen hidden">
            <div class="nav-bar">
                <button class="btn-nav" onclick="app.goBackToQuestions()">⬅ Về danh sách câu hỏi</button>
                <button class="btn-nav secondary" onclick="app.goBackToTopics()">🏠 Về trang chủ</button>
            </div>

            <div class="card">
                <div class="question-content">
                    <h3>Câu hỏi:</h3>
                    <p id="detail-question" class="text-large">Loading...</p>
                </div>

                <button id="btn-reveal" class="btn-primary" onclick="app.toggleAnswer()">Xem Câu Trả Lời</button>

                <div id="detail-answer-container" class="answer-content hidden">
                    <h3>Trả lời:</h3>
                    <p id="detail-answer" class="text-highlight">Loading...</p>
                </div>
            </div>
        </section>

        <footer>
            <p>Kiến thức pháp luật về biển đảo Việt Nam và Quốc tế</p>
        </footer>
    </div>

    <script>

// --- Application Logic ---
const app = {
    state: {
        currentTopicIndex: 0,
        currentQuestionIndex: 0
    },

    elements: {
        topicList: document.getElementById('topic-list'),
        questionList: document.getElementById('question-list'),
        topicTitleDisplay: document.getElementById('topic-title-display'),
        detailQuestion: document.getElementById('detail-question'),
        detailAnswer: document.getElementById('detail-answer'),
        answerContainer: document.getElementById('detail-answer-container'),
        btnReveal: document.getElementById('btn-reveal'),
        
        views: {
            topics: document.getElementById('view-topics'),
            questions: document.getElementById('view-questions'),
            detail: document.getElementById('view-detail')
        }
    },

    init: function() {
        this.renderTopics();
    },

    // UI Rendering
    renderTopics: function() {
        this.elements.topicList.innerHTML = '';
        db.forEach((topic, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn-item';
            btn.textContent = topic.title;
            btn.onclick = () => this.selectTopic(index);
            this.elements.topicList.appendChild(btn);
        });
    },

    renderQuestions: function(topicIndex) {
        const topic = db[topicIndex];
        this.elements.topicTitleDisplay.textContent = topic.title;
        this.elements.questionList.innerHTML = '';

        topic.items.forEach((item, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn-item';
            btn.textContent = item.q;
            btn.onclick = () => this.selectQuestion(index);
            this.elements.questionList.appendChild(btn);
        });
    },

    renderDetail: function(qIndex) {
        const item = db[this.state.currentTopicIndex].items[qIndex];
        
        // Populate text
        this.elements.detailQuestion.textContent = item.q;
        this.elements.detailAnswer.textContent = item.a;

        // Reset visual state
        this.elements.answerContainer.classList.add('hidden');
        this.elements.btnReveal.textContent = 'Xem Câu Trả Lời';
        this.elements.btnReveal.style.display = 'inline-block';
    },

    // Navigation Logic
    switchView: function(viewName) {
        // Hide all views
        Object.values(this.elements.views).forEach(el => {
            el.classList.remove('active');
            el.classList.add('hidden');
        });

        // Show target view
        this.elements.views[viewName].classList.remove('hidden');
        this.elements.views[viewName].classList.add('active');
        
        // Scroll to top
        window.scrollTo(0,0);
    },

    selectTopic: function(index) {
        this.state.currentTopicIndex = index;
        this.renderQuestions(index);
        this.switchView('questions');
    },

    selectQuestion: function(index) {
        this.state.currentQuestionIndex = index;
        this.renderDetail(index);
        this.switchView('detail');
    },

    toggleAnswer: function() {
        const isHidden = this.elements.answerContainer.classList.contains('hidden');
        if (isHidden) {
            this.elements.answerContainer.classList.remove('hidden');
            this.elements.btnReveal.style.display = 'none'; // Option A: Hide button
            // this.elements.btnReveal.textContent = 'Ẩn Câu Trả Lời'; // Option B: Toggle text
        }
    },

    goBackToTopics: function() {
        this.switchView('topics');
    },

    goBackToQuestions: function() {
        this.switchView('questions');
    }
};
